services:
  kidtype:
    build:
      context: .
      dockerfile: Dockerfile.cn
      args:
        NPM_REGISTRY: https://registry.npmmirror.com/
        PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple
    image: kidtype:local
    container_name: kidtype
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: sqlite:////data/typing.db
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?请在 .env 中设置 ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET:?请在 .env 中设置 SESSION_SECRET}
      SESSION_HOURS: ${SESSION_HOURS:-12}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-*}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-127.0.0.1}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      AUTO_CREATE_SCHEMA: "false"
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-3}
    volumes:
      - kidtype_data:/data

volumes:
  kidtype_data:
    name: kidtype_data

